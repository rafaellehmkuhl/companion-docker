# IPv4 lease range
dhcp-range=set:eth0,192.168.2.100,192.168.2.200,255.255.255.0,24h
dhcp-range=set:wlan0,192.168.4.100,192.168.4.200,255.255.255.0,24h

# IPv4 gateway (this device)
dhcp-option=tag:eth0,option:router,192.168.2.1
dhcp-option=tag:wlan0,option:router,192.168.4.1

# IPv6 lease range
dhcp-range=::1681:ff,::1681:ffff,constructor:eth0,ra-names,slaac,24h

# Adk client to poll for option changes every 6 hours
dhcp-option=option6:information-refresh-time,6h

# Set the DHCP server to authoritative mode to speed up leases acquisition.
dhcp-authoritative

# Enable DHCPv4 Rapid Commit
dhcp-rapid-commit

# Increase the cachesize
cache-size=1500

# Don't store in cache the invalid resolutions
no-negcache

# Don't read /etc/resolv.conf or any other file besides this one for configuration.
no-resolv

# Don't poll changes from external files (like /etc/resolv.conf)
no-poll

# Disable dnsmasq's DNS server
port=0

# Run dnsmasq as root to enable setting capabilities (needed to run on containers)
user=root